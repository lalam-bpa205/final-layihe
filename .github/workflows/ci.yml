name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: .NET SDK quraşdır
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore backend/SmartERP.slnx

      - name: Build
        run: dotnet build backend/SmartERP.slnx --configuration Release --no-restore

      # Testlər SQLite in-memory üzərində işləyir — xarici MySQL lazım deyil
      - name: Test
        run: dotnet test backend/SmartERP.slnx --configuration Release --no-build --verbosity normal

  frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Node quraşdır
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Asılılıqları qur
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
